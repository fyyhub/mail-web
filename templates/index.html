<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatTempMail · 邮件提取</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        brand: {
          500: '#10a37f',
          600: '#0d8a6a'
        },
        ink: {
          950: '#0f172a'
        }
      },
      boxShadow: {
        soft: '0 24px 80px rgba(15, 23, 42, 0.12)'
      }
    }
  }
}
</script>
<style>
.scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
.scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }
.fade-in { animation: fadeIn .24s ease-out; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.email-html-frame { width: 100%; min-height: 480px; border: 0; background: white; }
</style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-800 antialiased">

<div id="loginView" class="hidden min-h-screen bg-[radial-gradient(circle_at_top,_rgba(16,163,127,0.18),transparent_36%),linear-gradient(180deg,_#f8fcfb_0%,_#eef4f3_100%)] px-4 py-10 sm:py-16">
  <div class="mx-auto flex min-h-[calc(100vh-5rem)] max-w-md items-center justify-center">
    <div class="w-full rounded-[28px] border border-white/70 bg-white/90 p-8 shadow-soft backdrop-blur fade-in">
      <div class="text-center">
        <div class="mx-auto mb-5 flex h-16 w-16 items-center justify-center rounded-2xl bg-brand-500 shadow-lg shadow-brand-500/25">
          <svg class="h-8 w-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        </div>
        <p class="text-xs font-semibold uppercase tracking-[0.28em] text-brand-600/80">ChatTempMail</p>
        <h1 class="mt-3 text-3xl font-semibold text-slate-950">邮件提取面板</h1>
        <p class="mt-2 text-sm leading-6 text-slate-500">登录后只需输入一个邮箱地址，即可提取该收件箱下的全部邮件并查看详情。</p>
      </div>

      <form id="loginForm" class="mt-8 space-y-4">
        <div>
          <label class="mb-2 block text-sm font-medium text-slate-700">访问密码</label>
          <input id="passwordInput" type="password" required autofocus
                 class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 outline-none transition focus:border-brand-500 focus:ring-4 focus:ring-brand-500/15"
                 placeholder="请输入访问密码">
        </div>
        <p id="loginError" class="hidden rounded-2xl border border-red-100 bg-red-50 px-4 py-3 text-sm text-red-600"></p>
        <button type="submit" class="w-full rounded-2xl bg-ink-950 px-4 py-3 text-sm font-medium text-white transition hover:bg-slate-800">登录</button>
      </form>
    </div>
  </div>
</div>

<div id="mainView" class="hidden min-h-screen bg-[radial-gradient(circle_at_top,_rgba(16,163,127,0.18),transparent_32%),linear-gradient(180deg,_#f7fbfa_0%,_#eef3f5_100%)]">
  <header class="px-4 pb-4 pt-4 sm:px-6 sm:pt-6">
    <div class="mx-auto flex max-w-7xl flex-col gap-4 rounded-[28px] border border-white/70 bg-white/85 px-5 py-5 shadow-lg shadow-slate-200/50 backdrop-blur sm:px-6 lg:flex-row lg:items-center lg:justify-between fade-in">
      <div class="flex items-start gap-4">
        <div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-2xl bg-brand-500 shadow-lg shadow-brand-500/20">
          <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        </div>
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.28em] text-brand-600/80">Inbox Extractor</p>
          <h1 class="mt-1 text-2xl font-semibold text-slate-950">按邮箱提取全部邮件</h1>
          <p class="mt-2 max-w-2xl text-sm leading-6 text-slate-500">不再展示邮箱列表，也不提供新建邮箱。输入一个已存在的临时邮箱地址，系统会自动定位收件箱并拉取全部邮件。</p>
        </div>
      </div>
      <button onclick="logout()" class="inline-flex items-center justify-center rounded-2xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-medium text-slate-600 transition hover:border-slate-300 hover:text-slate-900">退出</button>
    </div>
  </header>

  <main class="px-4 pb-4 sm:px-6 sm:pb-6">
    <div class="mx-auto grid max-w-7xl gap-4 xl:grid-cols-[420px_minmax(0,1fr)]">
      <section class="flex min-h-[calc(100vh-12rem)] flex-col overflow-hidden rounded-[30px] border border-slate-200/80 bg-white/92 shadow-soft backdrop-blur">
        <div class="border-b border-slate-200/80 bg-white/90 px-5 py-5 sm:px-6">
          <p class="text-xs font-semibold uppercase tracking-[0.24em] text-brand-600/80">Lookup</p>
          <h2 class="mt-2 text-xl font-semibold text-slate-950">输入邮箱后立即提取</h2>
          <p class="mt-1 text-sm leading-6 text-slate-500">仅支持当前账户下已存在的邮箱地址。会自动翻页，返回该收件箱中的全部邮件。</p>

          <form id="searchForm" class="mt-5 space-y-3">
            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">邮箱地址</label>
              <div class="flex flex-col gap-2 sm:flex-row">
                <input id="targetEmailInput" type="email" required inputmode="email" autocomplete="off"
                       class="min-w-0 flex-1 rounded-2xl border border-slate-200 bg-white px-4 py-3 outline-none transition focus:border-brand-500 focus:ring-4 focus:ring-brand-500/15"
                       placeholder="例如: demo@chat-tempmail.com">
                <button id="searchSubmitBtn" type="submit" class="inline-flex shrink-0 items-center justify-center rounded-2xl bg-brand-500 px-4 py-3 text-sm font-medium text-white transition hover:bg-brand-600">提取邮件</button>
              </div>
            </div>
            <p id="searchError" class="hidden rounded-2xl border border-red-100 bg-red-50 px-4 py-3 text-sm text-red-600"></p>
          </form>

          <div class="mt-5 flex flex-col gap-3 rounded-3xl border border-slate-200 bg-slate-50/90 p-4">
            <div>
              <p id="selectedEmailAddr" class="text-sm font-semibold text-slate-900">未选择邮箱</p>
              <p id="inboxHint" class="mt-1 text-xs leading-5 text-slate-500">输入邮箱后即可开始提取。</p>
            </div>
            <div class="flex flex-wrap items-center gap-2">
              <button id="refreshMessagesBtn" type="button" onclick="refreshCurrentInbox()" disabled class="inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-600 transition hover:border-slate-300 hover:text-slate-900 disabled:cursor-not-allowed disabled:opacity-50">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h5M20 20v-5h-5M4 9a8 8 0 0114-4M20 15a8 8 0 01-14 4"/></svg>
                刷新
              </button>
              <label class="inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-600">
                <input type="checkbox" id="autoRefresh" class="rounded border-slate-300 text-brand-500 focus:ring-brand-500">
                自动刷新
              </label>
            </div>
          </div>
        </div>

        <div class="flex items-center justify-between border-b border-slate-200/80 bg-slate-50/80 px-5 py-3 sm:px-6">
          <h3 class="text-sm font-semibold text-slate-700">邮件列表</h3>
          <p id="messageTotal" class="text-xs text-slate-500">尚未查询</p>
        </div>

        <div id="messageList" class="scrollbar-thin flex-1 overflow-y-auto bg-white">
          <div class="px-6 py-14 text-center text-sm text-slate-400">输入邮箱后提取邮件</div>
        </div>
      </section>

      <section class="flex min-h-[calc(100vh-12rem)] flex-col overflow-hidden rounded-[30px] border border-slate-200/80 bg-white/92 shadow-soft backdrop-blur">
        <div class="border-b border-slate-200/80 bg-white/90 px-5 py-4 sm:px-6">
          <p class="text-xs font-semibold uppercase tracking-[0.24em] text-slate-400">Preview</p>
          <h2 class="mt-1 text-lg font-semibold text-slate-950">邮件详情</h2>
        </div>
        <div class="scrollbar-thin flex-1 overflow-y-auto bg-[linear-gradient(180deg,_rgba(248,250,252,0.82)_0%,_rgba(255,255,255,1)_16%)]">
          <div id="messageDetail" class="p-6 sm:p-8">
            <div class="rounded-[28px] border border-dashed border-slate-200 bg-white/85 px-6 py-16 text-center text-slate-400">
              <svg class="mx-auto mb-4 h-16 w-16 text-slate-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
              <p class="text-sm">提取邮件后，点击左侧任意一封邮件查看详情。</p>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>
</div>

<div id="toast" class="hidden fixed right-6 top-6 z-50 rounded-2xl px-4 py-3 text-sm text-white shadow-lg"></div>

<script src="/static/app.js"></script>
</body>
</html>
